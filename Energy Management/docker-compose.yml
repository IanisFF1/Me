version: '3.8'

services:
  # ------------------------------------
  # TRAEFIK (REVERSE PROXY & GATEWAY)
  # ------------------------------------
  traefik:
    image: "traefik:v2.10"
    container_name: "traefik"
    command:
      - "--api.insecure=true" # Activeaza Dashboard-ul de admin
      - "--providers.docker=true" # Ii spune sa asculte de Docker
      - "--providers.docker.exposedbydefault=false" # Nu expune containere decat daca le zicem noi explicit
      - "--entrypoints.web.address=:80" # Asculta pe portul 80 (HTTP standard)
    ports:
      - "80:80"     # Portul principal al aplicatiei
      - "8088:8080" # Portul pentru Dashboard-ul Traefik (sa vezi grafice)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro" # Are nevoie de acces la Docker ca sa vada serviciile
    networks:
      - energy-net

  # ------------------------------------
  # ZONA USERI
  # ------------------------------------
  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_DB: user-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ianis1234
    volumes:
      - user-data:/var/lib/postgresql/data
    networks:
      - energy-net

  user-service:
    build: ./user-microservice
    container_name: user-service
    # NU mai avem nevoie de ports "8080:8080" expus in afara, trecem doar prin Traefik!
    # Dar pentru siguranta in dev, le poti lasa comentate sau sterge.
    depends_on:
      - user-db
    environment:
      DB_IP: user-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ianis1234
      DB_DBNAME: user-db
      PORT: 8080
    networks:
      - energy-net
    labels:
      - "traefik.enable=true"
      # Regula: Orice request care incepe cu /people se duce aici
      - "traefik.http.routers.user.rule=PathPrefix(`/people`)"
      - "traefik.http.services.user.loadbalancer.server.port=8080"

  # ------------------------------------
  # ZONA DEVICE-URI
  # ------------------------------------
  device-db:
    image: postgres:15
    container_name: device-db
    environment:
      POSTGRES_DB: device-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ianis1234
    volumes:
      - device-data:/var/lib/postgresql/data
    networks:
      - energy-net

  device-service:
    build: ./device-microservice
    container_name: device-service
    depends_on:
      - device-db
    environment:
      DB_IP: device-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ianis1234
      DB_DBNAME: device-db
      PORT: 8081
    networks:
      - energy-net
    labels:
      - "traefik.enable=true"
      # Regula: Orice request care incepe cu /devices se duce aici
      - "traefik.http.routers.device.rule=PathPrefix(`/devices`)"
      - "traefik.http.services.device.loadbalancer.server.port=8081"

  # ------------------------------------
  # ZONA AUTH
  # ------------------------------------
  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_DB: credential-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ianis1234
    volumes:
      - auth-data:/var/lib/postgresql/data
    networks:
      - energy-net

  auth-service:
    build: ./auth-microservice
    container_name: auth-service
    depends_on:
      - auth-db
      - user-service
    environment:
      DB_IP: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ianis1234
      DB_DBNAME: credential-db
      PORT: 8082
    networks:
      - energy-net
    labels:
      - "traefik.enable=true"
      # Regula: Orice request care incepe cu /auth se duce aici
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.services.auth.loadbalancer.server.port=8082"

volumes:
  user-data:
  device-data:
  auth-data:

networks:
  energy-net:
    driver: bridge